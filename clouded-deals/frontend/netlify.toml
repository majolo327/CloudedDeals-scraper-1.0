[build]
  command = "npm run build"
  publish = ".next"
  ignore = "exit 1"

[build.environment]
  NODE_VERSION = "22"

# Extend serverless function timeout from default 10s to 26s.
# The auto-post route needs time for: Supabase query (~3s) + Twitter API
# with up to 3 retries (~10s worst case) + overhead.
[functions]
  external_node_modules = ["@netlify/plugin-nextjs"]
  node_bundler = "esbuild"

[functions."*"]
  timeout = 26

# Next.js requires the Netlify Next.js runtime plugin.
# Install @netlify/plugin-nextjs as a dev dependency or add it here.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.sentry.io https://www.google-analytics.com https://*.google-analytics.com https://*.googletagmanager.com; frame-ancestors 'none'"
